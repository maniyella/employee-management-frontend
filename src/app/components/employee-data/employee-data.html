<div class="container">
    <table border="1" cellspacing="90" cellpadding="8" class="table-bg">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Mobile</th>
          <th>Salary</th>
          <th>Update</th>
          <th>Delete</th>
        </tr>
      </thead>
    
      <tbody *ngIf="empList.length > 0">
        <tr *ngFor="let emp of empList; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ emp.name }}</td>
          <td>{{ emp.email }}</td>
          <td>{{ emp.mobile }}</td>
          <td>{{ emp.salary }}</td>
          <td (click)="updateEmployee(emp)"><i class='fas fa-pen'></i></td>
          <td data-bs-toggle="modal" data-bs-target="#exampleModal" #closeBtn (click)="(deleteId=emp._id)"><i class='fas fa-trash'></i></td>
        </tr>
      </tbody>
    </table>
  
</div>


<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Delete Confirmation</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="close($event)"></button>
      </div>
      <div class="modal-body">
         <h3>Are you sure want to delete ?</h3>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="close($event)">No</button>
        <button type="button" class="btn btn-primary" (click)="deleteEmp()">Yes</button>
      </div>
    </div>
  </div>
</div>
