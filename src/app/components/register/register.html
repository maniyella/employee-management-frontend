<div class="container mt-5">
    <h1 class="text-center">Register Employee</h1>
    <form [formGroup]="registerForm" (ngSubmit)="registerEmp(registerForm.value)">
        <div class="m-3">
            <label for="" class="mb-2">Name:</label>
            <input type="text" formControlName="name" class="form-control" placeholder="Enter name" autocomplete="off">
        </div>
        <div class="m-3">
            <label for="" class="mb-2">Email:</label>
            <input type="email" formControlName="email" class="form-control" placeholder="Enter email">
        </div>
        <div class="m-3">
            <label for="" class="mb-2">Mobile Number:</label>
            <input type="number" formControlName="mobile" class="form-control" placeholder="Enter mobile number">
        </div>
        <div class="m-3">
            <label for="" class="mb-2">Salary:</label>
            <input type="number" formControlName="salary" class="form-control" autocomplete="off">
        </div>
        <button class="btn btn-success w-100" type="submit">Submit</button>
    </form>
</div>
